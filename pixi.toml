[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
xarray = "*"
netcdf4 = "*"
# libnetcdf = "<4.10.0"
pytest = "*"
pytest-cov = "*"

[tasks]
tests = { cmd = "pytest --cov --cov-report=xml --cov-report=term", description = "Run tests with coverage" }
coverage = { cmd = "coverage html", depends-on = ["tests"], description = "Generate test coverage html report" }
